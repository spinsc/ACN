    <script>
        // ==========================================
        // CONFIGURAÇÃO SUPABASE (Credenciais Fornecidas)
        // ==========================================
        const S_URL = "https://pwourvwtigkuyeiwlggr.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3b3Vydnd0aWdrdXllaXdsZ2dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Njc4OTgsImV4cCI6MjA5NzI0Mzg5OH0.OwHMyUO-AuAShKVV3d1bH1NLVxzjo3TIPmWqiIqF36s";
        const _supa = supabase.createClient(S_URL, S_KEY);

        // ==========================================
        // VARIÁVEIS GLOBAIS (Originais)
        // ==========================================
        let ACN_DATA = [];
        let TERCEIROS_DATA = [];
        let CHICOTES_DATA = [];
        let LABORATORIO_DATA = [];
        let COMPRAS_REQ = [];
        let CHECKLISTS_HISTORICO = [];
        let VISTORIAS_DATA = [];
        let AJUSTES_DATA = [];
        let SERRALHERIA_DATA = [];
        let ACN_CLIENTES_CRM = [];
        let DEMANDAS_DIRETAS = [];
        let ACN_USUARIOS = [];

        let chartInstancia = null;
        let peContador = 1;
        let filtroStatus = "TODOS";
        let fDataInicio = "";
        let fDataFim = "";

        // ==========================================
        // CAMADA DE SINCRONIZAÇÃO SUPABASE
        // ==========================================

        async function carregarTudoDoSupabase() {
            try {
                const [o, d, c, a, req, cq, v, l, crm, usr] = await Promise.all([
                    _supa.from('oples').select('*'),
                    _supa.from('demandas_diretas').select('*'),
                    _supa.from('chicotes').select('*'), // se usar tabela separada
                    _supa.from('ajustes_projeto').select('*'),
                    _supa.from('compras_requisicoes').select('*'),
                    _supa.from('qualidade_historico').select('*'),
                    _supa.from('vistorias_patio').select('*'),
                    _supa.from('logistica_manifestos').select('*'),
                    _supa.from('crm_clientes').select('*'),
                    _supa.from('usuarios_acn').select('*')
                ]);

                ACN_DATA = o.data || [];
                DEMANDAS_DIRETAS = d.data || [];
                AJUSTES_DATA = a.data || [];
                COMPRAS_REQ = req.data || [];
                CHECKLISTS_HISTORICO = cq.data || [];
                VISTORIAS_DATA = v.data || [];
                TERCEIROS_DATA = l.data || [];
                ACN_CLIENTES_CRM = crm.data || [];
                ACN_USUARIOS = usr.data || [];
                
                // Filtros para Chicotes e Serralheria se estiverem na tabela de demandas_diretas
                CHICOTES_DATA = DEMANDAS_DIRETAS.filter(x => x.setor === 'Chicotes');
                SERRALHERIA_DATA = DEMANDAS_DIRETAS.filter(x => x.setor === 'Serralheria');

                renderizarTabelas();
                processarDashboard();
            } catch (err) {
                console.error("Erro ao carregar dados do Cloud:", err);
            }
        }

        // Funções de salvamento que substituem o localStorage.setItem
        async function dbUpsert(tabela, data) {
            const { error } = await _supa.from(tabela).upsert(data);
            if (error) console.error(`Erro ao salvar na tabela ${tabela}:`, error);
        }

        // ==========================================
        // SUBSTITUIÇÃO DAS FUNÇÕES ORIGINAIS
        // ==========================================

        // Substitui salvarEAtualizar()
        async function salvarEAtualizar() {
            // Mantém a lógica de logar no console se necessário
            await dbUpsert('oples', ACN_DATA);
            renderizarTabelas();
            processarDashboard();
        }

        // Substitui salvarAjustes()
        async function salvarAjustes() {
            await dbUpsert('ajustes_projeto', AJUSTES_DATA);
            renderizarTabelas();
        }

        // Substitui salvarCRM()
        async function salvarCRM() {
            await dbUpsert('crm_clientes', ACN_CLIENTES_CRM);
            renderizarCRM();
        }

        // Substitui ddSalvar()
        async function ddSalvar() {
            await dbUpsert('demandas_diretas', DEMANDAS_DIRETAS);
            _renderizarDemandasDiretas();
        }

        // Substitui chicSalvar()
        async function chicSalvar() {
            // No V23 Chicotes costumam ir para demandas_diretas ou tabela própria
            await dbUpsert('demandas_diretas', DEMANDAS_DIRETAS);
            _renderizarChicotes();
        }

        // Reescrita da função de login para consultar o Supabase
        async function acnDoLogin() {
            const u = document.getElementById('acn-login-user').value.trim().toLowerCase();
            const p = document.getElementById('acn-login-pass').value;
            
            const { data: user, error } = await _supa
                .from('usuarios_acn')
                .select('*')
                .eq('login', u)
                .eq('senha', p)
                .single();

            if (error || !user) {
                alert("⛔ Usuário ou senha inválidos.");
                return;
            }

            ACN_USER = { login: user.login, nome: user.nome, perfil: user.perfil };
            sessionStorage.setItem('ACN_USER_ATIVO', JSON.stringify(ACN_USER));
            document.getElementById('acn-login-modal').remove();
            _aplicarPermissoesAbas();
            _injetarBarraUsuario();
        }

        // ==========================================
        // HELPERS E LÓGICA DE UI (MANTIDOS)
        // ==========================================

        function obterTimestamp() { return Date.now(); }
        
        function obterDataHoraLog() {
            const d = new Date();
            const p = n => String(n).padStart(2, '0');
            return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
        }

        function showTab(nome) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            const alvo = document.getElementById('tab-' + nome);
            if (alvo) alvo.classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-slate-900','border-b-4','border-green-500','text-green-400');
                b.classList.add('hover:bg-slate-600');
            });
            const btn = document.getElementById('btn-' + nome);
            if (btn) {
                btn.classList.add('bg-slate-900','border-b-4','border-green-500','text-green-400');
                btn.classList.remove('hover:bg-slate-600');
            }
        }

        // ... Mantenha todas as outras funções originais do V23 (cadastrarVeiculo, renderizarGrafico, etc.) ...
        // APENAS certifique-se de que onde houver "localStorage.setItem", você chame a respectiva função Cloud acima.

        // ==========================================
        // BOOTSTRAP (Modificado para Cloud)
        // ==========================================

        window.onload = async function() {
            // 1. Carrega dados do Supabase
            await carregarTudoDoSupabase();
            
            // 2. Inicializa UI original
            injetarPaineisOPL();
            initCanvasEvents();
            
            // 3. Verifica Login (Customizado)
            if (!sessionStorage.getItem('ACN_USER_ATIVO')) {
                _injetarLoginUI();
            } else {
                ACN_USER = JSON.parse(sessionStorage.getItem('ACN_USER_ATIVO'));
                _aplicarPermissoesAbas();
                _injetarBarraUsuario();
            }
        };

        // NOTA: Para que as funções de "upsert" funcionem, os objetos no Supabase 
        // precisam ter uma Primary Key chamada 'id' (BigInt ou UUID). 
        // Seu código original já gera IDs usando Date.now(), o que é compatível.

    </script>
